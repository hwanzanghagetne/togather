spring:
  application:
    name: chat
  profiles:
    active: dev  # 기본값. 배포 시 prod로 변경

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000    # 30분 (ms)
  refresh-expiration: 604800000 # 7일 (ms)

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}

server:
  forward-headers-strategy: framework